name: auto update and deploy

on:
  schedule:
    - cron: "0 16 * * *" # 每天 00:00 北京时间 (UTC+8)
  workflow_dispatch: # 允许手动触发
    inputs:
      release_type:
        description: "选择更新版本类型" # 选择更新版本类型
        required: true
        default: "release"
        type: choice
        options:
          - "release"
          - "prerelease"
      kv-name:
        description: "KV命名空间名称"
        required: false
        default: "cf-new-kv"
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout 仓库 # 检出仓库代码
        uses: actions/checkout@v6

      - name: 检查并初始化 update_type.txt # 检查并初始化 update_type.txt 文件
        id: init_update_type_file
        run: |
          # 检查 update_type.txt 文件是否存在
          if [ ! -f "update_type.txt" ]; then
            # 如果文件不存在，则创建它并写入 '1' 作为默认内容 (1=正式版)
            echo "1" > update_type.txt
            # 设置环境变量，标记此文件是在当前工作流运行中创建的
            echo "UPDATE_TYPE_FILE_CREATED=true" >> $GITHUB_ENV
            echo "update_type.txt 文件不存在，已自动创建并设置为 '1' (正式版)。" # update_type.txt 文件不存在，已自动创建并设置为 '1' (正式版)。
          else
            echo "update_type.txt 文件已存在。" # update_type.txt 文件已存在。
          fi

      - name: 获取最新 release 信息 # 获取最新发布版本信息
        id: get_release
        run: |
          # 获取手动触发时选择的更新类型，默认为 'release'
          # 手动触发的优先级最高
          RELEASE_TYPE_INPUT="${{ github.event.inputs.release_type }}"
          ACTUAL_RELEASE_TYPE=""

          # 如果是定时任务触发，检查 update_type.txt 文件内容来确定更新类型
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 确保文件存在，因为上一步可能已经创建了
            if [ -f "update_type.txt" ]; then
              FILE_CONTENT=$(cat update_type.txt | tr -d '\n' | tr -d '\r')
              if [ "$FILE_CONTENT" == "0" ]; then
                # 如果文件内容为 '0'，则选择预发布类型
                ACTUAL_RELEASE_TYPE="prerelease"
              else
                # 否则，选择正式发布类型 (包括文件内容为 '1' 或其他非 '0' 的情况)
                ACTUAL_RELEASE_TYPE="release"
              fi
            else
              # 如果文件不存在 (理论上不会发生，因为上一步会创建)，默认正式版
              ACTUAL_RELEASE_TYPE="release"
            fi
          else
            # 如果是手动触发，使用手动输入的值
            ACTUAL_RELEASE_TYPE="$RELEASE_TYPE_INPUT"
          fi

          echo "当前选择的更新类型: $ACTUAL_RELEASE_TYPE" # 当前选择的更新类型

          if [ "$ACTUAL_RELEASE_TYPE" == "prerelease" ]; then
            # 如果选择预发布版本，获取所有 release 并筛选最新的非草稿预发布版本
            latest_tag=$(curl -s https://api.github.com/repos/byJoey/cfnew/releases \
              | jq -r 'map(select(.prerelease == true and .draft == false)) | sort_by(.published_at) | .[-1].tag_name')
            if [ -z "$latest_tag" ]; then
              echo "未找到任何预发布版本。" # 未找到任何预发布版本。
              exit 1
            fi
            echo "最新预发布版本: $latest_tag" # 最新预发布版本
          else
            # 默认或选择正式发布版本，获取最新正式发布版本 (GitHub API 的 /latest 默认返回非预发布版本)
            latest_tag=$(curl -s https://api.github.com/repos/byJoey/cfnew/releases/latest | jq -r '.tag_name')
            if [ -z "$latest_tag" ]; then
              echo "未找到任何正式发布版本。" # 未找到任何正式发布版本。
              exit 1
            fi
            echo "最新正式发布版本: $latest_tag" # 最新正式发布版本
          fi
          # 将最新标签名和实际选择的发布类型设置为环境变量，供后续步骤使用
          echo "latest_tag=$latest_tag" >> $GITHUB_ENV
          echo "release_type=$ACTUAL_RELEASE_TYPE" >> $GITHUB_ENV

      - name: 检查本地 version.txt # 检查本地 version.txt 文件
        id: check_version
        run: |
          # 检查是否存在 version.txt 文件
          if [ -f "version.txt" ]; then
            # 如果存在，读取当前版本号并去除换行符和回车符
            current_version=$(cat version.txt | tr -d '\n' | tr -d '\r')
            echo "当前本地版本: $current_version" # 当前本地版本
          else
            # 如果不存在，视为首次更新
            echo "未找到 version.txt，视为首次更新。" # 未找到 version.txt，视为首次更新。
            current_version=""
          fi
          # 将当前版本号设置为环境变量，供后续步骤使用
          echo "current_version=$current_version" >> $GITHUB_ENV

      - name: 判断是否需要更新 # 判断是否需要更新
        id: need_update
        run: |
          # 比较当前版本和最新版本是否一致
          if [ "$current_version" = "$latest_tag" ]; then
            echo "No update needed."
            # 设置环境变量 need_update 为 false
            echo "need_update=false" >> $GITHUB_ENV
          else
            echo "Update needed."
            # 设置环境变量 need_update 为 true
            echo "need_update=true" >> $GITHUB_ENV
          fi

      - name: 下载 Pages.zip 并提取 _worker.js # 下载 Pages.zip 并提取 _worker.js 文件
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          # 创建临时目录用于操作
          TEMP_DIR=$(mktemp -d)
          echo "创建临时目录: $TEMP_DIR"

          # 进入临时目录
          cd "$TEMP_DIR"

          # 构建下载 URL
          download_url="https://github.com/byJoey/cfnew/releases/download/${{ env.latest_tag }}/Pages.zip"
          echo "下载文件: $download_url"
          # 使用 curl 下载 Pages.zip
          curl -L -o Pages.zip "$download_url"
          # 验证 Pages.zip 是否下载成功
          if [ ! -f "Pages.zip" ] || [ ! -s "Pages.zip" ]; then
            echo "Pages.zip 下载失败或文件为空"
            exit 1
          fi
          echo "Pages.zip 下载成功"

          # 解压 Pages.zip
          echo "解压 Pages.zip..."
          unzip -o Pages.zip
          # 验证 _worker.js 是否存在
          if [ ! -f "_worker.js" ]; then
            echo "错误: Pages.zip 中未找到 _worker.js 文件"
            exit 1
          fi
          echo "_worker.js 提取成功"

          # 删除 Pages.zip，不保留原始压缩包
          rm -f Pages.zip
          echo "已删除 Pages.zip"

          # 将 _worker.js 复制回工作目录
          cp _worker.js "$GITHUB_WORKSPACE/_worker.js"
          echo "_worker.js 已复制到工作目录"

          # 将最新标签名写入 version.txt (在工作目录)
          echo "${{ env.latest_tag }}" > "$GITHUB_WORKSPACE/version.txt"

          # 清理临时目录
          rm -rf "$TEMP_DIR"
          echo "临时目录已清理"

      - name: 提交更新到 GitHub # 提交更新到 GitHub 仓库
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          # 配置 Git 用户名和邮箱，以便 GitHub Actions 可以提交代码
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 添加 _worker.js、version.txt 到 Git 暂存区
          git add _worker.js version.txt
          # 提交更改，提交信息包含更新的版本号
          git commit -m "Update _worker.js to version ${{ env.latest_tag }}"
          # 推送更改到远程仓库
          git push

      - name: 初始化环境
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          # 安装 wrangler
          npm install

      - name: 创建 KV 命名空间并绑定到 Worker # 执行 step-kv 脚本创建 KV 并绑定
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"

          # 设置执行权限
          chmod +x scripts/step-kv.sh

          # 执行 step-kv 脚本，使用 kv-name 输入参数
          ./scripts/step-kv.sh "${{ github.event.inputs.kv-name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 更新 wrangler.toml 中的 u 变量 # 更新 wrangler.toml 中的 u 变量
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"

          # 检查 secrets.CF_VAR_U 是否设置
          if [ -n "${{ secrets.CF_VAR_U }}" ]; then
            echo "正在更新 wrangler.toml 中的 u 变量..."

            # 使用 sed 更新 wrangler.toml 中的 u 值
            sed -i 's/u = ".*"/u = "${{ secrets.CF_VAR_U }}"/' wrangler.toml

            echo "wrangler.toml 中的 u 变量已更新"
          else
            echo "secrets.CF_VAR_U 未设置，跳过更新"
          fi
          # echo "输出 wrangler.toml 内容:"
          # cat wrangler.toml

      - name: 更新 wrangler.toml 中的自定义域名 # 更新自定义域名配置
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"

          # 检查 secrets.CF_ROUTE_DOMAIN 是否设置（Repository secrets）
          if [ -n "${{ secrets.CF_ROUTE_DOMAIN }}" ]; then
            echo "正在更新 wrangler.toml 添加自定义域名..."

            # 读取当前 wrangler.toml 内容
            CONTENT=$(cat wrangler.toml)

            # 检查是否已有 [[routes]] 配置
            if echo "$CONTENT" | grep -qE '^\[\[routes\]\]'; then
              # 如果已有 routes，删除整个 [[routes]] 部分
              echo "$CONTENT" | sed -E '/^\[\[routes\]\]$/,/^[[:space:]]*$/d' > wrangler.toml.tmp
              mv wrangler.toml.tmp wrangler.toml
            fi

            # 在 wrangler.toml 末尾添加 [[routes]] 配置
            echo '' >> wrangler.toml
            echo '[[routes]]' >> wrangler.toml
            echo 'pattern = "'"${{ secrets.CF_ROUTE_DOMAIN }}"'"' >> wrangler.toml
            echo 'custom_domain = true' >> wrangler.toml

            # 设置 workers_dev 为 false 以使用自定义域名
            sed -i 's/workers_dev = true/workers_dev = false/' wrangler.toml

            echo "wrangler.toml 中的自定义域名已添加"
          else
            echo "secrets.CF_ROUTE_DOMAIN 未设置，跳过自定义域名配置"
          fi
          # echo "输出 wrangler.toml 内容:"
          # cat wrangler.toml

      - name: 部署到 Cloudflare Workers # 部署到 Cloudflare Workers
        # 仅在需要更新时执行此步骤
        if: env.need_update == 'true'
        run: |
          # 部署 Worker
          npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 提交 update_type.txt (如果自动创建) # 提交 update_type.txt (如果文件是自动创建的)
        # 仅当 update_type.txt 文件是在当前工作流运行中自动创建时才执行此步骤
        if: env.UPDATE_TYPE_FILE_CREATED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update_type.txt
          git commit -m "feat: Auto-created update_type.txt with default 'release' type"
          git push

      - name: 发送更新成功通知 (复用或创建 GitHub Issue) # 发送更新成功通知 (复用或创建 GitHub Issue)
        # 仅在前面的步骤都成功执行且确实进行了更新时触发此通知
        if: success() && env.need_update == 'true'
        uses: actions/github-script@v8
        with:
          # 使用 GITHUB_TOKEN 进行身份验证，它具有创建 Issue 的权限
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 获取仓库所有者和名称
            const { owner, repo } = context.repo;
            // 从环境变量中获取最新标签名和发布类型
            const latestTag = process.env.latest_tag;
            const releaseType = process.env.release_type;
            const typeText = releaseType === 'prerelease' ? '预发布版本' : '正式版本'; // 根据发布类型设置文本
            // 定义通知 Issue 的标题和内容
            const notificationTitle = `_worker.js 自动更新通知`; // 用于查找和创建的统一标题
            const notificationBody = `_worker.js 已成功更新到${typeText} ${latestTag}。`;
            const timestamp = new Date().toLocaleString('zh-CN'); // 获取当前时间并格式化

            // 尝试查找带有特定标签的现有通知 Issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open', // 只查找开放的 Issue
              labels: 'auto-update-status-issue', // 用于识别此特定通知 Issue 的唯一标签
              per_page: 1 // 只获取一个结果
            });

            let targetIssue = null;
            if (issues.length > 0) {
              targetIssue = issues[0];
            }

            if (targetIssue) {
              // 如果找到现有 Issue，则在其上添加评论
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: targetIssue.number,
                body: `${notificationBody}\n\n更新时间: ${timestamp}` // 在评论中包含时间戳
              });
              console.log(`已在现有 Issue #${targetIssue.number} 上添加评论。`); // 打印日志
            } else {
              // 如果没有找到，则创建新的 Issue
              const { data: newIssue } = await github.rest.issues.create({
                owner,
                repo,
                title: notificationTitle, // 使用统一标题
                body: `${notificationBody}\n\n更新时间: ${timestamp}`, // 在 Issue 正文中包含时间戳
                labels: ['auto-update', 'success', 'auto-update-status-issue'] // 添加所有相关标签，包括唯一标签
              });
              console.log(`已创建新的 Issue #${newIssue.number}。`); // 打印日志
            }
